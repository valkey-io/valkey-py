name: spellcheck
on:
  pull_request:
jobs:
  check-spelling:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Check Spelling
        uses: rojopolis/spellcheck-github-actions@0.62.0
        with:
          config_path: .github/spellcheck-settings.yml
          task_name: Markdown
